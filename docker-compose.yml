services:
  db:
    image: postgres:15
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zapchasti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zapchasti}
      POSTGRES_DB: ${POSTGRES_DB:-zapchasti}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - appnet

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
    networks:
      - appnet

  # Веб-интерфейс для PostgreSQL (аналог phpMyAdmin)
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin}
    ports:
      - "5051:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - appnet

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - appnet

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      - db
      - redis
      - minio
    networks:
      - appnet

  frontend:
    build: ./frontend
    depends_on:
      - backend
    networks:
      - appnet

  celery:
    build: ./backend
    command: celery -A app.tasks.worker worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - backend
    networks:
      - appnet

  nginx:
    image: nginx:stable
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - appnet

volumes:
  postgres_data:
  minio_data:
  pgadmin_data:

networks:
  appnet: